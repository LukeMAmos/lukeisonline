<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gallery</title>
    <link rel="icon" type="image/x-icon" href="Images/ICON.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .gridBackground {

            /* This creates a base grey background */
            background-color: #1f26ed; 
            background-size: 50px 50px;

            /* Create a grid pattern background */
            background-image: 
                linear-gradient(to right, #ff1313 2px, transparent 2px), 
                linear-gradient(to bottom, #ff1313 2px, transparent 2px);

        }

        body {
            background: #1f26ed;
            min-height: 100vh;
            height: auto;
            position: relative;
        }
        h1{
            font-family: 'Bitcount Grid Double', monospace;
            text-align: left;
            color: #ffffff;
            font-weight: 200; 
            font-size: 75px;
            letter-spacing: 0.1em;

            margin-bottom: 5px;
            text-transform: uppercase;
            margin-top: 5px;
            margin-left: 5px;
            position: relative;
            z-index: 1;
            
            
        }
         /* ============================================
           ABOUT ME BUTTON - Same style, smaller size
           ============================================ */
        .about-button {
            font-family: 'Bitcount Grid Double', monospace;
            color: #ffffff;
            font-weight: 200;
            font-size: 36px;              /* Smaller than h1 (75px) */
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;        /* Remove underline */
            
            background: transparent;
            border: 3px solid #ffffff;
            border-radius: 12px;
            padding: 10px 25px;
            
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
            white-space: nowrap;
        }

        .about-button:hover {
            background: #ffffff;
            color: #ff1313;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }
    
        .writing-button {
            font-family: 'Bitcount Grid Double', monospace;
            color: #ffffff;
            font-weight: 200;
            font-size: 36px;              /* Smaller than h1 (75px) */
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;        /* Remove underline */
            
            background: transparent;
            border: 3px solid #ffffff;
            border-radius: 12px;
            padding: 10px 25px;
            
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
            white-space: nowrap;
        }

        .writing-button:hover {
            background: #ffffff;
            color: #ff1313;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            padding: 5px 20px;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
        }

         /* ============================================
           REUSABLE PHOTO HOLDER COMPONENT
           Use class="photo-holder" on any container
           ============================================ */
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            padding: 20px;
        }

        /* The flip card container */
        .project-card {
            perspective: 1000px;
            cursor: pointer;
        }

        /* The inner wrapper that flips */
        .project-card__inner {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
            transform-style: preserve-3d;
        }

        /* Flipped state */
        .project-card.flipped .project-card__inner {
            transform: rotateY(180deg);
        }

        /* Front and back faces */
        .project-card__front,
        .project-card__back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            
            /* Match your existing photo-holder styling */
            background: #ffffff;
            border: 4px solid #ff1313;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 255, 0.15);
            
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Front face */
        .project-card__front {
            z-index: 2;
        }

        /* Back face */
        .project-card__back {
            transform: rotateY(180deg);
            background: #ffffff;
            justify-content: center;
        }

        /* Image container */
        .project-card__image-wrapper {
            flex: 1;
            overflow: hidden;
            border-radius: 16px;
            background: #f0f0f0;
            margin-bottom: 15px;
        }

        .project-card__image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* GitHub button on card back */
        .github-button {
            font-family: 'Bitcount Grid Double', monospace;
            color: #1f26ed;
            font-weight: 200;
            font-size: 22px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            background: transparent;
            border: 3px solid #1f26ed;
            border-radius: 12px;
            padding: 10px 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
            white-space: nowrap;
            margin-top: 10px;
            text-align: center;
        }

        .github-button:hover {
            background: #1f26ed;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(31, 38, 237, 0.4);
            transform: scale(1.05);
        }
        /* Caption on front */
        .project-card__caption {
            font-family: 'Bitcount Grid Double', monospace;
            font-size: 28px;
            color: #333;
            text-align: center;
            font-weight: 400;
        }

        /* Description on back */
        .project-card__title {
            font-family: 'Bitcount Grid Double', monospace;
            font-size: 28px;
            color: #ff1313;
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .project-card__description {
            font-family: 'Bitcount Grid Double', monospace;
            font-size: 16px;
            color: #333;
            line-height: 1.6;
            text-align: center;
        }

        .project-card:hover .project-card__front {
            box-shadow: 0 12px 24px rgba(255, 19, 19, 0.3);
            transition: opacity 0.5s ease;
        }
        .project-card:hover .project-card__back {
            box-shadow: 0 12px 30px rgba(255, 19, 19, 0.3);
            transition: opacity 0.5s ease;
        }
        /* Hover hint */
        .project-card__front::after {
            content: 'flip';
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-family: 'Bitcount Grid Double', monospace;
            font-size: 12px;
            color: #7f7e7e;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .project-card:hover .project-card__front::after {
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-container {
                flex-direction: column;
                align-items: flex-start;
            }
            
            h1 {
                font-size: 48px;
            }
            
            .about-button, .writing-button {
                font-size: 24px;
            }
            
            .project-card__caption {
                font-size: 22px;
            }
        }

        /* Footer styling */
        .footer {
            position: relative;
            z-index: 1;
            padding: 30px 20px;
            margin-top: auto;
        }

        .footer-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .social-link {
            font-family: 'Bitcount Grid Double', monospace;
            color: #ffffff;
            font-size: 24px;
            font-weight: 200;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            
            background: transparent;
            border: 3px solid #ffffff;
            border-radius: 16px;
            padding: 15px 30px;
            
            display: flex;
            align-items: center;
            gap: 12px;
            
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .social-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transition: left 0.5s ease;
        }

        .social-link:hover {
            background: #ffffff;
            color: #1f26ed;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
            transform: translateY(-3px) scale(1.02);
        }


        /* Responsive */
        @media (max-width: 768px) {
            .social-link {
                font-size: 18px;
                padding: 12px 20px;
            }
            
            .social-icon {
                width: 24px;
                height: 24px;
            }
        }

    </style>
</head>
<body>

    <div class="gridBackground" style="position: fixed; inset: 0; z-index: 0;"></div>

       <!-- Header with title and button side by side -->
    <div class="header-container">
        <h1 class="title">PROJECT GALLERY</h1>
        <a href="writing.html" class="writing-button">NOTEPAD</a>

    </div>

    <footer class="footer">
        <div class="footer-container">
            
            <!-- Instagram Link -->
            <a href="https://instagram.com/sgwarrr" target="_blank" class="social-link">

            </a>

            <!-- Email Link -->

</body>
</html>
